<svg viewBox="0 0 100 240" preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="prtvBlade" x1="0" x2="1">
              <stop offset="0%"   stop-color="#9a6a32"/>
              <stop offset="35%"  stop-color="#e8c896"/>
              <stop offset="65%"  stop-color="#d4a574"/>
              <stop offset="100%" stop-color="#7a4818"/>
            </linearGradient>
            <linearGradient id="prtvHandle" x1="0" x2="1">
              <stop offset="0%"   stop-color="#1a0a05"/>
              <stop offset="50%"  stop-color="#3a2010"/>
              <stop offset="100%" stop-color="#1a0a05"/>
            </linearGradient>
          </defs>
          <!-- HANDLE at TOP (where hands grip, chest height in stance) -->
          <ellipse cx="50" cy="12" rx="9" ry="3.5" fill="#0a0502"/>
          <rect x="41" y="12" width="18" height="80" rx="3" fill="url(#prtvHandle)"/>
          <line x1="41" y1="26" x2="59" y2="26" stroke="#000" stroke-width="1.2" opacity=".45"/>
          <line x1="41" y1="40" x2="59" y2="40" stroke="#000" stroke-width="1.2" opacity=".45"/>
          <line x1="41" y1="54" x2="59" y2="54" stroke="#000" stroke-width="1.2" opacity=".45"/>
          <line x1="41" y1="68" x2="59" y2="68" stroke="#000" stroke-width="1.2" opacity=".45"/>
          <line x1="41" y1="82" x2="59" y2="82" stroke="#000" stroke-width="1.2" opacity=".45"/>
          <!-- Shoulder taper -->
          <polygon points="34,98 66,98 60,92 40,92" fill="#a87842"/>
          <!-- BLADE extending DOWN to ground -->
          <rect x="22" y="98" width="56" height="128" rx="5" fill="url(#prtvBlade)" stroke="#5a3818" stroke-width="1.4"/>
          <rect x="46" y="108" width="8" height="100" rx="2" fill="rgba(255,215,0,0.22)"/>
          <line x1="30" y1="104" x2="30" y2="222" stroke="rgba(80,40,15,.4)" stroke-width="0.6"/>
          <line x1="38" y1="104" x2="38" y2="222" stroke="rgba(80,40,15,.45)" stroke-width="0.6"/>
          <line x1="50" y1="104" x2="50" y2="222" stroke="rgba(80,40,15,.55)" stroke-width="0.8"/>
          <line x1="62" y1="104" x2="62" y2="222" stroke="rgba(80,40,15,.45)" stroke-width="0.6"/>
          <line x1="70" y1="104" x2="70" y2="222" stroke="rgba(80,40,15,.4)" stroke-width="0.6"/>
          <!-- TOE at the bottom (touches the ground) -->
          <rect x="22" y="225" width="56" height="5" rx="2" fill="#2a1a08"/>
        </svg>