<svg class="ps-bat" id="ps-bat" viewBox="0 0 100 240" preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="bladeGrad" x1="0" x2="1" y1="0" y2="0">
          <stop offset="0%"   stop-color="#9a6a32"/>
          <stop offset="35%"  stop-color="#e8c896"/>
          <stop offset="65%"  stop-color="#d4a574"/>
          <stop offset="100%" stop-color="#7a4818"/>
        </linearGradient>
        <linearGradient id="handleGrad" x1="0" x2="1" y1="0" y2="0">
          <stop offset="0%"   stop-color="#1a0a05"/>
          <stop offset="50%"  stop-color="#3a2010"/>
          <stop offset="100%" stop-color="#1a0a05"/>
        </linearGradient>
      </defs>
      <!-- TOE (top of screen — bat tip, away from hand) -->
      <rect x="22" y="10" width="56" height="5" rx="2" fill="#2a1a08"/>
      <!-- BLADE (upper section, between toe and shoulder) -->
      <rect x="22" y="14" width="56" height="128" rx="5" fill="url(#bladeGrad)" stroke="#5a3818" stroke-width="1.4"/>
      <!-- Sweet spot (PS green glow) -->
      <rect x="46" y="36" width="8" height="100" rx="2" fill="rgba(154,223,107,0.32)"/>
      <!-- Wood grain -->
      <line x1="30" y1="18" x2="30" y2="138" stroke="rgba(80,40,15,.4)" stroke-width="0.6"/>
      <line x1="38" y1="18" x2="38" y2="138" stroke="rgba(80,40,15,.45)" stroke-width="0.6"/>
      <line x1="50" y1="18" x2="50" y2="138" stroke="rgba(80,40,15,.55)" stroke-width="0.8"/>
      <line x1="62" y1="18" x2="62" y2="138" stroke="rgba(80,40,15,.45)" stroke-width="0.6"/>
      <line x1="70" y1="18" x2="70" y2="138" stroke="rgba(80,40,15,.4)" stroke-width="0.6"/>
      <!-- Shoulder taper -->
      <polygon points="34,142 66,142 60,148 40,148" fill="#a87842"/>
      <!-- HANDLE (lower section — your gripping hand at phone bottom) -->
      <rect x="41" y="148" width="18" height="80" rx="3" fill="url(#handleGrad)"/>
      <!-- Grip stripes -->
      <line x1="41" y1="160" x2="59" y2="160" stroke="#000" stroke-width="1.2" opacity=".45"/>
      <line x1="41" y1="174" x2="59" y2="174" stroke="#000" stroke-width="1.2" opacity=".45"/>
      <line x1="41" y1="188" x2="59" y2="188" stroke="#000" stroke-width="1.2" opacity=".45"/>
      <line x1="41" y1="202" x2="59" y2="202" stroke="#000" stroke-width="1.2" opacity=".45"/>
      <line x1="41" y1="216" x2="59" y2="216" stroke="#000" stroke-width="1.2" opacity=".45"/>
      <!-- Bottom cap (where hand grips — phone bottom) -->
      <ellipse cx="50" cy="228" rx="9" ry="3.5" fill="#0a0502"/>
    </svg>