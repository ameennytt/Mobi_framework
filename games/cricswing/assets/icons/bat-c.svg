<svg viewBox="0 0 120 280" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="prBladeGrad" x1="0" x2="1">
            <stop offset="0%" stop-color="#9a6a32"/>
            <stop offset="50%" stop-color="#e8c896"/>
            <stop offset="100%" stop-color="#7a4818"/>
          </linearGradient>
        </defs>
        <!-- Phone outline (drawn behind the bat — shows how phone IS the bat) -->
        <rect x="38" y="18" width="44" height="244" rx="9" fill="#0a0e18" stroke="#2a4a7a" stroke-width="2"/>
        <rect x="44" y="28" width="32" height="216" rx="3" fill="#10182a"/>
        <!-- Charging port (bottom of phone = bat handle bottom) -->
        <rect x="54" y="256" width="12" height="3" rx="1.5" fill="#5a7080"/>
        <!-- Speaker grille (top) -->
        <rect x="52" y="22" width="16" height="2" rx="1" fill="#2a3850"/>
        <!-- Bat overlay (semi-transparent) -->
        <g opacity="0.78">
          <rect x="30" y="14" width="60" height="5" rx="2" fill="#2a1a08"/>
          <rect x="30" y="18" width="60" height="146" rx="5" fill="url(#prBladeGrad)" stroke="#5a3818" stroke-width="1.4"/>
          <rect x="56" y="40" width="8" height="118" rx="2" fill="rgba(255,215,0,0.22)"/>
          <polygon points="42,164 78,164 72,170 48,170" fill="#a87842"/>
          <rect x="50" y="170" width="20" height="86" rx="3" fill="#2a1a10"/>
          <line x1="50" y1="184" x2="70" y2="184" stroke="#000" stroke-width="1" opacity=".45"/>
          <line x1="50" y1="200" x2="70" y2="200" stroke="#000" stroke-width="1" opacity=".45"/>
          <line x1="50" y1="216" x2="70" y2="216" stroke="#000" stroke-width="1" opacity=".45"/>
          <line x1="50" y1="232" x2="70" y2="232" stroke="#000" stroke-width="1" opacity=".45"/>
          <ellipse cx="60" cy="256" rx="10" ry="3.5" fill="#0a0502"/>
        </g>
      </svg>