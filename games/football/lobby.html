<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FootyShoot V1 - Lobby</title>
  <link rel="stylesheet" href="/framework/ui/framework.css">
  <style>
    body {
      background: radial-gradient(ellipse at bottom, #0d381e 0%, #030a05 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .lobby-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      text-align: center;
    }
    h2 {
      color: var(--game-accent);
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .input-group {
      margin: 20px 0;
      text-align: left;
    }
    label {
      font-size: 12px;
      font-weight: 700;
      color: var(--game-muted);
      text-transform: uppercase;
      display: block;
      margin-bottom: 8px;
    }
    select {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: var(--game-text);
      padding: 12px;
      font-weight: bold;
      outline: none;
    }
    select:focus {
      border-color: var(--game-accent);
    }
    .pairing-box {
      margin-bottom: 20px;
    }
    input[type="text"] {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: var(--game-accent);
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      padding: 8px;
      letter-spacing: 4px;
      text-transform: uppercase;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: var(--game-accent);
    }
  </style>
</head>
<body>

  <div class="lobby-card">
    <h2>FootyShoot V1</h2>
    <p style="font-size: 13px; color: var(--game-muted); margin-bottom: 20px;">Football Kick Challenge</p>

    <div class="pairing-box">
      <label for="room-code">Enter TV Room Code</label>
      <input type="text" id="room-code" maxlength="6" placeholder="CODE">
    </div>

    <div class="input-group">
      <label for="difficulty">Goalkeeper Difficulty</label>
      <select id="difficulty">
        <option value="slow">Amateur (Slow)</option>
        <option value="medium" selected>Professional (Medium)</option>
        <option value="fast">World Class (Fast)</option>
      </select>
    </div>

    <button id="connect-btn" class="btn btn-primary" style="width: 100%; font-size: 16px; padding: 14px;">CONNECT & PLAY</button>
  </div>

  <script src="/framework/services/storage.js"></script>
  <script src="/framework/services/event-hub.js"></script>
  <script src="/framework/services/theme-loader.js"></script>
  <script src="/framework/services/asset-loader.js"></script>
  <script src="/framework/ui/components.js"></script>
  <script>
    'use strict';
    
    // Load config and apply theme
    window.onload = async () => {
      await window.FrameworkTheme.load('football');
      await window.FrameworkAssets.loadConfig('football');

      const connectBtn = document.getElementById('connect-btn');
      const roomInput = document.getElementById('room-code');
      const difficultySelect = document.getElementById('difficulty');

      // Autofill last room code
      const savedCode = sessionStorage.getItem('lastRoomCode') || '';
      if (savedCode) {
        roomInput.value = savedCode;
      }

      connectBtn.onclick = () => {
        const code = roomInput.value.trim().toUpperCase();
        if (code.length < 4) {
          window.FrameworkUI.showToast('Please enter a valid room code', 2000, true);
          return;
        }

        sessionStorage.setItem('lastRoomCode', code);
        
        // Connect event hub
        window.FrameworkEvents.connect(code, 'bat');
        
        window.FrameworkEvents.on('role', () => {
          // Send setup info
          window.FrameworkEvents.send('SETUP_GAME', {
            difficulty: difficultySelect.value
          });
          // Redirect to controller.html
          setTimeout(() => {
            window.location.href = `/games/football/controller.html?room=${code}&diff=${difficultySelect.value}`;
          }, 300);
        });

        window.FrameworkEvents.on('error', (err) => {
          window.FrameworkUI.showToast(err.msg || 'Connection error', 3000, true);
        });
      };
    };
  </script>
</body>
</html>
