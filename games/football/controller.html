<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FootyShoot - Controller</title>
  <link rel="stylesheet" href="/framework/ui/framework.css">
  <style>
    body {
      background: radial-gradient(ellipse at bottom, #061c0c 0%, #020b04 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
      height: 100dvh;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1.5px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 12px;
    }
    .hud-box {
      display: flex;
      gap: 12px;
      margin: 16px 0;
    }
    .field-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .aim-arrow {
      width: 10px;
      height: 120px;
      background: linear-gradient(to top, rgba(57, 255, 20, 0.1), var(--game-accent));
      border-radius: 5px;
      transform-origin: bottom center;
      transition: transform 0.1s;
      position: relative;
    }
    .aim-arrow::after {
      content: '';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 15px solid var(--game-accent);
    }
    .kick-btn {
      width: 100%;
      height: 60px;
      font-size: 20px;
      font-weight: 900;
      border-radius: 12px;
      background: var(--game-accent);
      color: var(--game-primary);
      box-shadow: 0 8px 20px rgba(57, 255, 20, 0.3);
      border: none;
      cursor: pointer;
    }
    .aim-btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      width: 100%;
    }
    .aim-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--game-text);
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 13px;
    }
    .aim-btn.active {
      background: rgba(57, 255, 20, 0.2);
      border-color: var(--game-accent);
      color: var(--game-accent);
    }
  </style>
</head>
<body>

  <div class="status-bar">
    <div style="font-size: 16px; font-weight: 800; color: var(--game-accent);">FootyShoot</div>
    <div id="conn-status" style="font-size: 11px; background: rgba(255,255,255,0.08); padding: 4px 10px; border-radius: 20px; color: var(--game-warning);">
      CONNECTING...
    </div>
  </div>

  <div class="hud-box">
    <div class="score-card" style="flex: 1; padding: 10px;">
      <div style="font-size: 11px; text-transform: uppercase; color: var(--game-muted);" id="lbl-primary">Goals</div>
      <div id="hud-primary" class="score-num" style="font-size: 24px;">0</div>
    </div>
    <div class="score-card" style="flex: 1; padding: 10px;">
      <div style="font-size: 11px; text-transform: uppercase; color: var(--game-muted);" id="lbl-secondary">Fouls</div>
      <div id="hud-secondary" class="score-num" style="font-size: 24px; color: var(--game-text);">0</div>
    </div>
  </div>

  <div class="field-area">
    <div class="aim-arrow" id="arrow"></div>
    <div id="aim-text" style="font-size: 14px; color: var(--game-muted); margin-top: 20px; font-weight: 700;">Aim: Center (0°)</div>
    <div style="font-size: 11px; color: var(--game-muted); margin-top: 4px;">Tilt phone or tap buttons to aim</div>
  </div>

  <div>
    <div class="aim-btn-row">
      <button class="aim-btn" id="btn-left">LEFT</button>
      <button class="aim-btn active" id="btn-center">CENTER</button>
      <button class="aim-btn" id="btn-right">RIGHT</button>
    </div>
    <button class="kick-btn" id="kick-btn">SHOOT / KICK!</button>
    <div style="text-align: center; font-size: 11px; color: var(--game-muted); margin-top: 8px;">
      Tip: Shake/Flick your device quickly to perform a physical kick!
    </div>
  </div>

  <!-- Framework imports -->
  <script src="/framework/services/storage.js"></script>
  <script src="/framework/services/event-hub.js"></script>
  <script src="/framework/services/theme-loader.js"></script>
  <script src="/framework/services/asset-loader.js"></script>
  <script src="/framework/inputs/motion-input.js"></script>
  <script src="/framework/inputs/input-bridge.js"></script>
  <script src="/framework/ui/components.js"></script>
  <script>
    'use strict';

    let currentAim = 'center'; // 'left', 'center', 'right'
    let currentAngle = 0;      // tilt angle
    let goals = 0;
    let fouls = 0;
    let isKicking = false;

    window.onload = async () => {
      await window.FrameworkTheme.load('football');
      await window.FrameworkAssets.loadConfig('football');

      // Update HUD Labels from configurations
      document.getElementById('lbl-primary').textContent = window.FrameworkAssets.text('PRIMARY_SCORE');
      document.getElementById('lbl-secondary').textContent = window.FrameworkAssets.text('SECONDARY_SCORE');

      const urlParams = new URLSearchParams(window.location.search);
      const room = urlParams.get('room');

      if (!room) {
        window.FrameworkUI.showConfirmDialog({
          title: 'Missing Room Code',
          body: 'Lobby requires a valid room code connection.',
          confirmText: 'Go to Lobby',
          onConfirm: () => { window.location.href = '/games/football/lobby.html'; }
        });
        return;
      }

      // Initialize connection
      window.FrameworkEvents.connect(room, 'bat');

      window.FrameworkEvents.on('sys:connected', () => {
        document.getElementById('conn-status').textContent = 'CONNECTED';
        document.getElementById('conn-status').style.color = 'var(--game-success)';
      });

      window.FrameworkEvents.on('sys:disconnected', () => {
        document.getElementById('conn-status').textContent = 'DISCONNECTED';
        document.getElementById('conn-status').style.color = 'var(--game-danger)';
      });

      // Handle game updates
      window.FrameworkEvents.on('GAME_STATE_UPDATE', (data) => {
        goals = data.goals || 0;
        fouls = data.fouls || 0;
        document.getElementById('hud-primary').textContent = goals;
        document.getElementById('hud-secondary').textContent = fouls;
        isKicking = false;
        document.getElementById('kick-btn').disabled = false;
        document.getElementById('kick-btn').textContent = 'SHOOT / KICK!';
      });

      // Handle results
      window.FrameworkEvents.on('GAME_OVER', (data) => {
        window.FrameworkUI.showConfirmDialog({
          title: 'Match Finished!',
          body: `Final Score: ${goals} Goals, ${fouls} Fouls.`,
          confirmText: 'Play Again',
          onConfirm: () => { window.location.href = `/games/football/lobby.html`; }
        });
      });

      // UI button handlers
      const btnLeft = document.getElementById('btn-left');
      const btnCenter = document.getElementById('btn-center');
      const btnRight = document.getElementById('btn-right');
      const arrow = document.getElementById('arrow');
      const aimText = document.getElementById('aim-text');

      function setAim(aim, angle) {
        currentAim = aim;
        currentAngle = angle;
        arrow.style.transform = `rotate(${angle}deg)`;
        
        btnLeft.classList.toggle('active', aim === 'left');
        btnCenter.classList.toggle('active', aim === 'center');
        btnRight.classList.toggle('active', aim === 'right');
        
        const degText = angle > 0 ? `+${angle}` : angle;
        aimText.textContent = `Aim: ${aim.toUpperCase()} (${degText}°)`;
      }

      btnLeft.onclick = () => setAim('left', -25);
      btnCenter.onclick = () => setAim('center', 0);
      btnRight.onclick = () => setAim('right', 25);

      const triggerKick = () => {
        if (isKicking) return;
        isKicking = true;
        document.getElementById('kick-btn').disabled = true;
        document.getElementById('kick-btn').textContent = 'KICKED!';
        
        // Relays the action
        window.FrameworkEvents.send('KICK', {
          aim: currentAim,
          angle: currentAngle,
          power: 80 + Math.random() * 20
        });
        
        window.FrameworkUI.showToast('Kicked!', 1000);
      };

      document.getElementById('kick-btn').onclick = triggerKick;

      // Start sensors
      try {
        const sensorsActive = await window.FrameworkMotion.requestPermission();
        if (sensorsActive) {
          window.FrameworkMotion.start();

          // Aim dynamically with phone tilt (gamma represents left/right roll)
          window.FrameworkMotion.subscribeOrientation((data) => {
            const rawGamma = data.raw.gamma; // tilt
            // Normalize tilt to a reasonable angle range [-35, 35]
            let angle = Math.max(-35, Math.min(35, rawGamma));
            
            // Map angle to discrete left/center/right aims
            let aim = 'center';
            if (angle < -12) aim = 'left';
            if (angle > 12) aim = 'right';

            setAim(aim, Math.round(angle));
          });

          // Detect physical kick via rapid motion magnitude spike
          let lastKickTime = 0;
          window.FrameworkMotion.subscribeMotion((data) => {
            const now = Date.now();
            // Trigger threshold is mag > 16. Same threshold as CricSwing onset.
            if (data.mag > 18 && (now - lastKickTime > 1500) && !isKicking) {
              lastKickTime = now;
              triggerKick();
            }
          });
        }
      } catch (e) {
        console.warn('Sensors not available:', e);
      }
    };
  </script>
</body>
</html>
