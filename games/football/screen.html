<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FootyShoot V1 - TV Arena</title>
  <link rel="stylesheet" href="/framework/ui/framework.css">
  <style>
    body {
      background: radial-gradient(ellipse at 30% 0%, #061c0c 0%, #020b04 100%);
      margin: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #game-canvas {
      width: 100vw;
      height: 100vh;
      display: block;
      background: transparent;
    }
    .hud-title {
      position: absolute;
      top: 32px;
      left: 32px;
      font-size: 28px;
      font-weight: 900;
      color: var(--game-accent);
      z-index: 10;
    }
    .hud-scores {
      position: absolute;
      top: 32px;
      right: 32px;
      display: flex;
      gap: 24px;
      background: rgba(10, 20, 30, 0.85);
      border: 2px solid var(--game-accent);
      border-radius: 16px;
      padding: 12px 24px;
      z-index: 10;
      font-family: monospace;
    }
    .hud-score-val {
      font-size: 28px;
      font-weight: bold;
      color: var(--game-text);
    }
    .alert-banner {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 80px;
      font-weight: 900;
      color: var(--game-accent);
      text-shadow: 0 0 24px rgba(57, 255, 20, 0.6);
      z-index: 20;
      pointer-events: none;
      display: none;
      text-transform: uppercase;
      animation: bannerPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes bannerPop {
      0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="hud-title" id="hud-app-title">FootyShoot V1</div>

  <div class="hud-scores">
    <div style="text-align: center;">
      <div style="font-size: 11px; color: var(--game-muted); text-transform: uppercase;" id="lbl-primary">Goals</div>
      <div class="hud-score-val" id="score-primary" style="color: var(--game-accent);">0</div>
    </div>
    <div style="width: 1px; background: rgba(255, 255, 255, 0.15);"></div>
    <div style="text-align: center;">
      <div style="font-size: 11px; color: var(--game-muted); text-transform: uppercase;" id="lbl-secondary">Fouls</div>
      <div class="hud-score-val" id="score-secondary">0</div>
    </div>
    <div style="width: 1px; background: rgba(255, 255, 255, 0.15);"></div>
    <div style="text-align: center;">
      <div style="font-size: 11px; color: var(--game-muted); text-transform: uppercase;" id="lbl-progress">Kicks</div>
      <div class="hud-score-val" id="score-progress" style="color: var(--game-warning);">0/5</div>
    </div>
  </div>

  <div class="alert-banner" id="alert-banner">GOAL!</div>

  <canvas id="game-canvas"></canvas>

  <!-- Framework imports -->
  <script src="/framework/services/storage.js"></script>
  <script src="/framework/services/event-hub.js"></script>
  <script src="/framework/services/theme-loader.js"></script>
  <script src="/framework/services/asset-loader.js"></script>
  <script src="/framework/renderer/tv-perf-manager.js"></script>
  <script src="/framework/renderer/layer-manager.js"></script>
  <script src="/framework/renderer/renderer.js"></script>
  <script src="/framework/ui/components.js"></script>
  <script>
    'use strict';

    let roomCode = '';
    let gameActive = false;
    let difficulty = 'medium';

    // Game stats
    let goals = 0;
    let fouls = 0;
    let kicks = 0;
    const maxKicks = 5;

    // Canvas sizes & assets
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    // Goalkeeper position & states
    let goalie = { x: 0, y: 0, targetX: 0, targetY: 0, size: 28, color: '#ff4444' };
    let ball = { x: 0, y: 0, startX: 0, startY: 0, targetX: 0, targetY: 0, size: 14, progress: 0, state: 'idle' }; // 'idle', 'moving', 'hit'

    window.onload = async () => {
      // Load styles and assets
      await window.FrameworkTheme.load('football');
      await window.FrameworkAssets.loadConfig('football');

      // Update static HUD text from game configuration
      document.getElementById('hud-app-title').textContent = window.FrameworkAssets.text('APP_TITLE');
      document.getElementById('lbl-primary').textContent = window.FrameworkAssets.text('PRIMARY_SCORE');
      document.getElementById('lbl-secondary').textContent = window.FrameworkAssets.text('SECONDARY_SCORE');
      document.getElementById('lbl-progress').textContent = window.FrameworkAssets.text('PROGRESS_METRIC');

      // Auto size canvas
      resizeCanvas();
      window.onresize = resizeCanvas;

      // Start performance manager & renderer loop
      window.FrameworkTvPerf.init();
      window.FrameworkRenderer.init(canvas, renderGame);
      window.FrameworkRenderer.start();

      // Retrieve room from query or session
      const urlParams = new URLSearchParams(window.location.search);
      let wantedCode = urlParams.get('room') || sessionStorage.getItem('cricswing_tv_room') || '';
      
      // Connect WS screen role
      window.FrameworkEvents.connect(wantedCode, 'screen');

      // Wire pairing notifications
      window.FrameworkEvents.on('ROOM_CREATED', (data) => {
        roomCode = data.code;
        sessionStorage.setItem('cricswing_tv_room', roomCode);
        window.FrameworkUI.renderPairingOverlay(roomCode, 'waiting');
      });

      window.FrameworkEvents.on('BAT_CONNECTED', () => {
        window.FrameworkUI.hidePairingOverlay();
        window.FrameworkUI.showToast('Controller Connected! Prepare to play.', 3000);
        gameActive = true;
        resetPitch();
      });

      window.FrameworkEvents.on('BAT_DISCONNECTED', () => {
        window.FrameworkUI.renderPairingOverlay(roomCode, 'waiting');
        gameActive = false;
      });

      // Handle custom setup message from controller
      window.FrameworkEvents.on('SETUP_GAME', (data) => {
        difficulty = data.difficulty || 'medium';
        goals = 0;
        fouls = 0;
        kicks = 0;
        updateScoresUI();
        resetPitch();
      });

      // Handle shot triggers
      window.FrameworkEvents.on('KICK', (data) => {
        if (!gameActive || ball.state !== 'idle') return;
        
        kicks++;
        document.getElementById('score-progress').textContent = `${kicks}/${maxKicks}`;

        const aim = data.aim; // 'left', 'center', 'right'
        
        // Calculate goal target coordinates
        const goalY = canvas.height * 0.28;
        let goalX = canvas.width * 0.5;
        if (aim === 'left') goalX = canvas.width * 0.38;
        if (aim === 'right') goalX = canvas.width * 0.62;

        // Add minor angle offset based on tilt
        goalX += (data.angle || 0) * 2;

        // Choose Goalkeeper dive direction
        const goalieOptions = ['left', 'center', 'right'];
        
        // Goalkeeper AI intelligence bias based on difficulty
        let goalieDive = 'center';
        const rand = Math.random();
        if (difficulty === 'slow') {
          // Bad reaction: 40% chance goalkeeper dives opposite, 30% center, 30% correct
          goalieDive = rand < 0.4 ? (aim === 'left' ? 'right' : 'left') : goalieOptions[Math.floor(Math.random() * 3)];
        } else if (difficulty === 'fast') {
          // World class: 70% chance goalkeeper dives correctly towards shot aim
          goalieDive = rand < 0.7 ? aim : goalieOptions[Math.floor(Math.random() * 3)];
        } else {
          // Professional: 50% chance goalkeeper dives correctly
          goalieDive = rand < 0.5 ? aim : goalieOptions[Math.floor(Math.random() * 3)];
        }

        let goalieTargetX = canvas.width * 0.5;
        if (goalieDive === 'left') goalieTargetX = canvas.width * 0.4;
        if (goalieDive === 'right') goalieTargetX = canvas.width * 0.6;

        // Start animation sequence
        ball.startX = ball.x;
        ball.startY = ball.y;
        ball.targetX = goalX;
        ball.targetY = goalY;
        ball.progress = 0;
        ball.state = 'moving';

        goalie.targetX = goalieTargetX;
        goalie.targetY = goalie.y;

        // Check if saved
        const isSave = (goalieDive === aim);
        
        setTimeout(() => {
          triggerResult(isSave);
        }, 800);
      });
    };

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      resetPitch();
    }

    function resetPitch() {
      // Reset goalie position
      goalie.x = canvas.width * 0.5;
      goalie.y = canvas.height * 0.3;
      goalie.targetX = goalie.x;
      
      // Reset ball position
      ball.x = canvas.width * 0.5;
      ball.y = canvas.height * 0.8;
      ball.progress = 0;
      ball.state = 'idle';
    }

    function triggerResult(isSave) {
      const banner = document.getElementById('alert-banner');
      if (isSave) {
        fouls++;
        banner.textContent = 'SAVED!';
        banner.style.color = 'var(--game-danger)';
        banner.style.textShadow = '0 0 24px rgba(255, 0, 0, 0.6)';
      } else {
        goals++;
        banner.textContent = 'GOAL!';
        banner.style.color = 'var(--game-accent)';
        banner.style.textShadow = '0 0 24px rgba(57, 255, 20, 0.6)';
      }
      
      banner.style.display = 'block';
      updateScoresUI();

      // Relay new score state back to controller
      window.FrameworkEvents.send('GAME_STATE_UPDATE', {
        goals,
        fouls,
        kicks
      });

      setTimeout(() => {
        banner.style.display = 'none';
        
        if (kicks >= maxKicks) {
          gameActive = false;
          // Trigger game over
          window.FrameworkEvents.send('GAME_OVER', { goals, fouls });
        } else {
          resetPitch();
        }
      }, 1800);
    }

    function updateScoresUI() {
      document.getElementById('score-primary').textContent = goals;
      document.getElementById('score-secondary').textContent = fouls;
      document.getElementById('score-progress').textContent = `${kicks}/${maxKicks}`;
    }

    // Goalkeeper and Football rendering loop
    function renderGame(dt) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!gameActive) {
        // Render simple placeholder text when waiting for pair
        ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.font = 'bold 36px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('FOOTYSHOOT ARENA', canvas.width / 2, canvas.height / 2);
        return;
      }

      // Draw Football Goalpost
      const gw = canvas.width * 0.35;
      const gh = canvas.height * 0.2;
      const gx = (canvas.width - gw) / 2;
      const gy = canvas.height * 0.18;

      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 6;
      ctx.strokeRect(gx, gy, gw, gh);

      // Draw Net mesh details
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.lineWidth = 1.5;
      for (let i = gx; i <= gx + gw; i += 20) {
        ctx.beginPath();
        ctx.moveTo(i, gy);
        ctx.lineTo(i, gy + gh);
        ctx.stroke();
      }
      for (let j = gy; j <= gy + gh; j += 20) {
        ctx.beginPath();
        ctx.moveTo(gx, j);
        ctx.lineTo(gx + gw, j);
        ctx.stroke();
      }

      // Goalkeeper Dive movement lerp
      goalie.x += (goalie.targetX - goalie.x) * 0.1;

      // Draw Goalkeeper (Jersey color matches theme Danger color)
      ctx.fillStyle = goalie.color;
      ctx.beginPath();
      ctx.arc(goalie.x, goalie.y, goalie.size, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('GK', goalie.x, goalie.y + 4);

      // Ball animation lerp
      if (ball.state === 'moving') {
        ball.progress += 0.04;
        if (ball.progress >= 1) {
          ball.progress = 1;
          ball.state = 'hit';
        }

        // Quadratic bezier trajectory to simulate flight height curve
        const t = ball.progress;
        const u = 1 - t;
        
        // Linear path
        ball.x = u * ball.startX + t * ball.targetX;
        const linearY = u * ball.startY + t * ball.targetY;
        
        // Curved height: arch ball up and down
        const heightArc = Math.sin(t * Math.PI) * 100;
        ball.y = linearY - heightArc;
      }

      // Draw Football
      ctx.fillStyle = '#ffffff';
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = 3;
      ctx.beginPath();
      // Dynamically shrink ball in size to represent perspective distance scaling
      const currentBallSize = ball.size * (1 - ball.progress * 0.35);
      ctx.arc(ball.x, ball.y, currentBallSize, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
  </script>
</body>
</html>
