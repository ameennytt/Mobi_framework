<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Game — Controller</title>
  <link rel="stylesheet" href="/framework/ui/framework.css">
  <style>
    body { margin: 0; height: 100dvh; display: flex; flex-direction: column; padding: 16px;
      box-sizing: border-box; touch-action: manipulation; }
    .top { display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1.5px solid var(--fw-line); padding-bottom: 12px; }
    .top .name { font-size: 16px; font-weight: 800; color: var(--game-accent); }
    .hud { display: flex; gap: 12px; margin: 16px 0; }
    .hud .score-card { flex: 1; }
    .hud .lbl { font-size: 11px; text-transform: uppercase; color: var(--game-muted); }
    .hud .num { font-size: 26px; font-weight: 900; color: var(--game-text); font-family: var(--game-mono); }
    .mid { flex: 1; display: flex; align-items: center; justify-content: center; }
    .go { width: 100%; height: 84px; font-size: 22px; }
    .tip { text-align: center; font-size: 11px; color: var(--game-muted); margin-top: 10px; }
  </style>
</head>
<body>
  <div class="top">
    <div class="name" id="title">My Game</div>
    <div class="pill" id="conn">CONNECTING…</div>
  </div>

  <div class="hud">
    <div class="score-card"><div class="lbl">Score</div><div class="num" id="val-score">0</div></div>
    <div class="score-card"><div class="lbl">Left</div><div class="num" id="val-left">0</div></div>
    <div class="score-card"><div class="lbl">Best</div><div class="num" id="val-best">0</div></div>
  </div>

  <div class="mid">
    <button class="btn btn-primary go" id="go-btn">TAP</button>
  </div>
  <div class="tip">This is the generic controller — replace TAP with your game's inputs.</div>

  <script src="/framework/services/storage.js"></script>
  <script src="/framework/services/event-hub.js"></script>
  <script src="/framework/services/theme-loader.js"></script>
  <script src="/framework/services/asset-loader.js"></script>
  <script src="/framework/ui/components.js"></script>
  <script src="/framework/core/game.js"></script>

  <script>
    'use strict';
    window.onload = async () => {
      const params = new URLSearchParams(location.search);
      const attempts = parseInt(params.get('attempts') || '5', 10);

      const game = await window.FrameworkGame.init({
        role: 'bat',
        onConnect: () => setChip('CONNECTED', 'var(--game-success)'),
        onDisconnect: () => setChip('RECONNECTING…', 'var(--game-muted)'),
        onPaired: () => game.send('start', { attempts }),
        handlers: {
          screen_rejoined: () => game.send('start', { attempts }),
          game_state: (d) => { setNum('val-score', d.score); setNum('val-left', d.left); setNum('val-best', d.best); },
          game_over: (d) => {
            window.FrameworkUI.showConfirmDialog({
              title: 'Game Over', body: `Score: ${d.score} · Best: ${d.best}`,
              confirmText: 'Play Again',
              onConfirm: () => { window.location.href = '/games/starter/lobby.html'; },
            });
          },
        },
      });

      document.getElementById('title').textContent = game.text('APP_TITLE');
      // The ONE input. Swap for your controls; send any payload your gameplay reads.
      document.getElementById('go-btn').onclick = () => {
        if (navigator.vibrate) navigator.vibrate(25);
        game.send('action', {});
      };

      function setChip(t, c) { const e = document.getElementById('conn'); e.textContent = t; e.style.color = c; }
      function setNum(id, v) { document.getElementById(id).textContent = (v == null ? 0 : v); }
    };
  </script>
</body>
</html>
