<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Game — Lobby</title>
  <link rel="stylesheet" href="/framework/ui/framework.css">
  <link rel="stylesheet" href="/framework/flow/flow.css">
  <style> body { margin: 0; min-height: 100dvh; } </style>
</head>
<body>
  <!-- The whole lobby (pair → pick → ready) is built by FrameworkFlow from
       game-config.json `flow`. You normally don't edit this file. -->
  <script src="/framework/services/storage.js"></script>
  <script src="/framework/services/event-hub.js"></script>
  <script src="/framework/services/theme-loader.js"></script>
  <script src="/framework/services/asset-loader.js"></script>
  <script src="/framework/services/router.js"></script>
  <script src="/framework/ui/components.js"></script>
  <script src="/framework/core/game.js"></script>
  <script src="/framework/flow/lobby-flow.js"></script>

  <script>
    'use strict';
    window.onload = async () => {
      const game = await window.FrameworkGame.init({ role: 'bat', autoConnect: false });
      const config = await fetch('/games/starter/game-config.json').then(r => r.json()).catch(() => ({}));

      window.FrameworkFlow.mount({
        game,
        config,
        onLaunch: (sel) => {
          const code = sel.room || sessionStorage.getItem('starter_room') || '';
          const q = new URLSearchParams({ room: code, attempts: sel.attempts || 5 });
          window.location.href = `/games/starter/controller.html?${q.toString()}`;
        },
      });
    };
  </script>
</body>
</html>
