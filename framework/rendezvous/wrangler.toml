# Central rendezvous Worker — ONE deploy serves every game. Edit:
#   - routes.pattern: your hub domain (must be on Cloudflare), e.g. play.yourstudio.com
name = "game-hub-rendezvous"
main = "worker.js"
compatibility_date = "2025-01-01"
workers_dev = false

routes = [
  { pattern = "play.yourstudio.com", custom_domain = true }
]

[[durable_objects.bindings]]
name = "PAIRS_DO"
class_name = "PairingSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PairingSession"]
