buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 21
        compileSdkVersion = 35
        targetSdkVersion = 35
        // NDK r27+ aligns native .so to 16 KB by default (Play requirement). RN 0.77
        // default. NOTE: `npx @react-native-community/cli upgrade 0.77.x` regenerates
        // this file from the 0.77 template — re-apply this ndkVersion after the upgrade.
        ndkVersion = "27.1.12297006"
        kotlinVersion = "1.9.24"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"
