<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chase — Lobby</title>
  <link rel="stylesheet" href="/framework/ui/framework.css">
  <link rel="stylesheet" href="/framework/flow/flow.css">
  <style>
    body { background: radial-gradient(ellipse at bottom, #0d1830 0%, #060a14 100%); margin: 0; min-height: 100dvh; }
  </style>
</head>
<body>
  <!-- The entire lobby flow is built by FrameworkFlow into #fw-flow-root -->

  <script src="/framework/services/storage.js"></script>
  <script src="/framework/services/event-hub.js"></script>
  <script src="/framework/services/theme-loader.js"></script>
  <script src="/framework/services/asset-loader.js"></script>
  <script src="/framework/services/router.js"></script>
  <script src="/framework/ui/components.js"></script>
  <script src="/framework/core/game.js"></script>
  <script src="/framework/flow/lobby-flow.js"></script>

  <script>
    'use strict';
    window.onload = async () => {
      // Boot as a controller; don't open the real socket until a code is typed.
      const game = await window.FrameworkGame.init({ role: 'bat', autoConnect: false });

      // The flow is data-driven from game-config.json (modes / teams / formats…).
      const config = await fetch('/games/chase/game-config.json').then(r => r.json()).catch(() => ({}));

      window.FrameworkFlow.mount({
        game,
        config,
        onLaunch: (sel) => {
          const code = sel.room || sessionStorage.getItem('chase_room') || '';
          const q = new URLSearchParams({
            room: code,
            target: sel.target || 0,
            overs: sel.overs || 2,
            difficulty: sel.difficulty || 'medium',
          });
          window.location.href = `/games/chase/controller.html?${q.toString()}`;
        },
      });
    };
  </script>
</body>
</html>
