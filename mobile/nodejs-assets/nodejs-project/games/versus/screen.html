<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Striker Duel — TV Screen</title>
  <link rel="stylesheet" href="/framework/ui/framework.css">
  <style>
    body { margin: 0; overflow: hidden; background: var(--game-primary); }
    #game-canvas { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <script src="/framework/services/storage.js"></script>
  <script src="/framework/services/event-hub.js"></script>
  <script src="/framework/services/theme-loader.js"></script>
  <script src="/framework/services/asset-loader.js"></script>
  <script src="/framework/renderer/tv-perf-manager.js"></script>
  <script src="/framework/renderer/layer-manager.js"></script>
  <script src="/framework/renderer/renderer.js"></script>
  <script src="/framework/renderer/shot-visuals.js"></script>
  <script src="/framework/renderer/fields.js"></script>
  <script src="/framework/renderer/arena-scene.js"></script>
  <script src="/framework/ui/components.js"></script>
  <script src="/framework/ui/templates.js"></script>
  <script src="/framework/core/game.js"></script>

  <script src="/games/versus/gameplay.js"></script>

  <script>
    'use strict';
    window.onload = async () => {
      // Stadium + the football goal field overlay.
      window.FrameworkArena.install({ field: 'goal' });

      const game = await window.FrameworkGame.init({
        role: 'screen',
        canvas: 'game-canvas',
        draw: window.Gameplay.draw,
        onPaired: () => {
          window.Gameplay.setPaired(true);
          window.Gameplay.start({ rounds: 5, difficulty: 'medium' });   // until phone sends start
        },
        onUnpaired: () => window.Gameplay.setPaired(false),
        handlers: window.Gameplay.handlers,
      });

      window.Gameplay.attach(game);
    };
  </script>
</body>
</html>
